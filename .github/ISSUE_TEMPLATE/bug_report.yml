name: Bug report
description: Report a reproducible bug in Memograph
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Include expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: macOS version, Apple Silicon model, repo commit or release tag
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Remove secrets before posting.
