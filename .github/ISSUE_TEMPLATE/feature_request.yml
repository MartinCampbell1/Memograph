name: Feature request
description: Suggest a feature or UX improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is missing or painful?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy or permissions impact
      description: Call out any screenshot, OCR, audio, or provider implications.
